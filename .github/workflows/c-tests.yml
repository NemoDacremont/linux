name: C tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'drivers/**/*.[ch]'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install musl-gcc
      run: sudo apt install -y musl musl-tools libxml2 libelf-dev bc libssl-dev qemu-system-x86_64
    - name: Test code formatting
      run: make -C pfa test_format
    - name: Validation test of v0
      run: make -C pfa ctval_v0
    - name: Validation test of v1
      run: make -C pfa ctval_v1
