name: C tests

on: 
  pull_request:
    paths:
      - 'drivers/**/*.[ch]'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Test code formatting
      run: make -C pfa test_format
    - name: Validation test of v0
      run: make -C pfa ctval_v0
